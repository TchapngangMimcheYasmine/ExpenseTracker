<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - ExpenseTracker by Yasmine</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); color: white; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); }
    nav h1 { color: #e94560; font-size: 1.5rem; }
    nav h1 span { font-size: 0.75rem; color: #aaa; display: block; }
    nav div { display: flex; align-items: center; gap: 15px; }
    nav span { color: #aaa; }
    nav button { padding: 8px 20px; border-radius: 20px; border: 1px solid #e94560; background: transparent; color: #e94560; cursor: pointer; transition: 0.3s; }
    nav button:hover { background: #e94560; color: white; }
    .container { padding: 30px 40px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; text-align: center; }
    .stat-card .icon { font-size: 2rem; margin-bottom: 10px; }
    .stat-card h3 { font-size: 0.9rem; color: #aaa; margin-bottom: 5px; }
    .stat-card p { font-size: 1.5rem; font-weight: bold; color: #e94560; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; }
    .card h2 { margin-bottom: 20px; font-size: 1.1rem; color: #e94560; }
    input, select { width: 100%; padding: 10px 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 0.9rem; }
    select option { background: #1a1a2e; }
    input::placeholder { color: #aaa; }
    .btn { width: 100%; padding: 11px; border-radius: 8px; border: none; background: #e94560; color: white; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn:hover { opacity: 0.8; }
    .depense-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
    .depense-info h4 { font-size: 0.9rem; }
    .depense-info span { font-size: 0.75rem; color: #aaa; }
    .depense-montant { color: #e94560; font-weight: bold; }
    .message { text-align: center; margin-top: 10px; font-size: 0.85rem; }
    .chart-container { position: relative; height: 250px; }
    .budget-row { display: flex; gap: 10px; margin-bottom: 15px; }
    .budget-row input { margin-bottom: 0; }
    .budget-row button { width: auto; padding: 10px 20px; }
    @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } nav { padding: 15px 20px; } .container { padding: 20px; } }
  </style>
</head>
<body>
  <nav>
    <h1>💰 ExpenseTracker <span>by Yasmine</span></h1>
    <div>
      <span id="nomUser"></span>
      <button onclick="deconnecter()">Déconnexion</button>
    </div>
  </nav>
  <div class="container">
    <div class="stats-grid">
      <div class="stat-card"><div class="icon">💸</div><h3>Total ce mois</h3><p id="totalMois">0 FCFA</p></div>
      <div class="stat-card"><div class="icon">📋</div><h3>Nombre de dépenses</h3><p id="nombreDepenses">0</p></div>
      <div class="stat-card"><div class="icon">🏆</div><h3>Catégorie principale</h3><p id="categorieTop">-</p></div>
      <div class="stat-card"><div class="icon">📅</div><h3>Dernière dépense</h3><p id="derniereDepense">-</p></div>
    </div>
    <div class="main-grid">
      <div class="card">
        <h2>🎯 Mon budget mensuel</h2>
        <div class="budget-row">
          <input type="number" id="budget" placeholder="Budget mensuel (FCFA)" />
          <button class="btn" onclick="sauvegarderBudget()">OK</button>
        </div>
        <div id="budgetInfo"></div>
        <h2 style="margin-top:20px;">➕ Ajouter une dépense</h2>
        <input type="number" id="montant" placeholder="Montant (FCFA)" />
        <select id="categorie">
          <option value="">Choisir une catégorie</option>
          <option value="Nourriture">🍔 Nourriture</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Loisirs">🎮 Loisirs</option>
          <option value="Santé">💊 Santé</option>
          <option value="Vêtements">👗 Vêtements</option>
          <option value="Education">📚 Education</option>
          <option value="Autres">📦 Autres</option>
        </select>
        <input type="date" id="date" />
        <input type="text" id="description" placeholder="Description (optionnel)" />
        <button class="btn" onclick="ajouterDepense()">Ajouter</button>
        <div class="message" id="message"></div>
      </div>
      <div class="card">
        <h2>📊 Dépenses par catégorie</h2>
        <div class="chart-container"><canvas id="chartCategorie"></canvas></div>
      </div>
      <div class="card" style="grid-column: 1 / -1;">
        <h2>📋 Mes dépenses</h2>
        <div id="listeDepenses"></div>
      </div>
    </div>
  </div>
  <script>
    const API = 'https://expensetracker-57oz.onrender.com/api';
    let token = localStorage.getItem('token');
    let user = JSON.parse(localStorage.getItem('user'));
    let chart = null;

    if (!token) window.location.href = 'login.html';
    document.getElementById('nomUser').textContent = user ? user.nom : '';

    const budgetSauvegarde = localStorage.getItem('budget');
    if (budgetSauvegarde) document.getElementById('budget').value = budgetSauvegarde;

    function deconnecter() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    function sauvegarderBudget() {
      const budget = document.getElementById('budget').value;
      if (!budget) return;
      localStorage.setItem('budget', budget);
      chargerDepenses();
    }

    async function ajouterDepense() {
      const montant = document.getElementById('montant').value;
      const categorie = document.getElementById('categorie').value;
      const date = document.getElementById('date').value;
      const description = document.getElementById('description').value;
      const message = document.getElementById('message');
      if (!montant || !categorie || !date) {
        message.style.color = '#e94560';
        message.textContent = 'Montant, catégorie et date sont obligatoires';
        return;
      }
      try {
        const response = await fetch(API + '/depenses', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ montant, categorie, date, description })
        });
        const data = await response.json();
        if (response.ok) {
          message.style.color = '#4caf50';
          message.textContent = 'Dépense ajoutée !';
          document.getElementById('montant').value = '';
          document.getElementById('description').value = '';
          chargerDepenses();
        } else {
          message.style.color = '#e94560';
          message.textContent = data.message;
        }
      } catch (err) {
        message.style.color = '#e94560';
        message.textContent = 'Erreur serveur';
      }
    }

    async function chargerDepenses() {
      try {
        const response = await fetch(API + '/depenses', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const depenses = await response.json();
        const liste = document.getElementById('listeDepenses');
        liste.innerHTML = '';
        if (depenses.length === 0) {
          liste.innerHTML = '<p style="color:#aaa;text-align:center;">Aucune dépense pour l\'instant</p>';
          return;
        }
        let total = 0;
        const maintenant = new Date();
        const categories = {};
        depenses.forEach(function(d) {
          const dateDepense = new Date(d.date);
          if (dateDepense.getMonth() === maintenant.getMonth() && dateDepense.getFullYear() === maintenant.getFullYear()) {
            total += parseFloat(d.montant);
          }
          categories[d.categorie] = (categories[d.categorie] || 0) + parseFloat(d.montant);
          const item = document.createElement('div');
          item.className = 'depense-item';
          item.innerHTML =
            '<div class="depense-info"><h4>' + d.categorie + (d.description ? ' - ' + d.description : '') + '</h4><span>' + new Date(d.date).toLocaleDateString('fr-FR') + '</span></div>' +
            '<div style="display:flex;align-items:center;gap:10px;"><span class="depense-montant">' + parseFloat(d.montant).toLocaleString() + ' FCFA</span><button onclick="supprimerDepense(' + d.id + ')" title="Supprimer">🗑️</button></div>';
          liste.appendChild(item);
        });
        document.getElementById('totalMois').textContent = total.toLocaleString() + ' FCFA';
        document.getElementById('nombreDepenses').textContent = depenses.length;
        const topCategorie = Object.keys(categories).reduce(function(a, b) { return categories[a] > categories[b] ? a : b; }, '');
        document.getElementById('categorieTop').textContent = topCategorie || '-';
        const derniere = depenses[0];
        document.getElementById('derniereDepense').textContent = derniere ? new Date(derniere.date).toLocaleDateString('fr-FR') : '-';
        const budget = localStorage.getItem('budget');
        const budgetInfo = document.getElementById('budgetInfo');
        if (budget) {
          const pourcentage = Math.round((total / budget) * 100);
          if (pourcentage >= 100) {
            budgetInfo.innerHTML = '<div style="background:#e9456022;border:1px solid #e94560;border-radius:10px;padding:12px;color:#e94560;margin-bottom:15px;">⚠️ Budget dépassé ! Tu as dépensé ' + pourcentage + '% de ton budget !</div>';
          } else if (pourcentage >= 80) {
            budgetInfo.innerHTML = '<div style="background:#ff980022;border:1px solid #ff9800;border-radius:10px;padding:12px;color:#ff9800;margin-bottom:15px;">🔔 Attention ! Tu as dépensé ' + pourcentage + '% de ton budget</div>';
          } else {
            budgetInfo.innerHTML = '<div style="background:#4caf5022;border:1px solid #4caf50;border-radius:10px;padding:12px;color:#4caf50;margin-bottom:15px;">✅ Budget OK : ' + pourcentage + '% utilisé (' + total.toLocaleString() + ' / ' + parseFloat(budget).toLocaleString() + ' FCFA)</div>';
          }
        }
        afficherGraphique(categories);
      } catch (err) { console.error(err); }
    }

    function afficherGraphique(categories) {
      const ctx = document.getElementById('chartCategorie').getContext('2d');
      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: Object.keys(categories),
          datasets: [{ data: Object.values(categories), backgroundColor: ['#e94560','#0f3460','#533483','#e94560aa','#16213e','#4caf50','#ff9800'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: 'white', font: { size: 11 } } } } }
      });
    }

    async function supprimerDepense(id) {
      if (!confirm('Supprimer cette dépense ?')) return;
      try {
        await fetch(API + '/depenses/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        chargerDepenses();
      } catch (err) { console.error(err); }
    }

    chargerDepenses();
  </script>
</body>
</html>
