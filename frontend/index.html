<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExpenseTracker by Yasmine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .hero { text-align: center; padding: 40px; }
    .hero h1 { font-size: 3rem; margin-bottom: 5px; color: #e94560; }
    .hero h1 span { font-size: 1rem; display: block; color: #aaa; margin-bottom: 10px; }
    .hero p { font-size: 1.2rem; margin-bottom: 30px; color: #aaa; }
    .btns a {
      display: inline-block;
      margin: 10px;
      padding: 15px 40px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-primary { background: #e94560; color: white; }
    .btn-secondary { border: 2px solid #e94560; color: #e94560; }
    .btn-primary:hover { opacity: 0.8; }
    .btn-secondary:hover { background: #e94560; color: white; }
    .features { display: flex; gap: 20px; margin-top: 50px; flex-wrap: wrap; justify-content: center; }
    .feature-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 25px;
      width: 200px;
      text-align: center;
    }
    .feature-card .icon { font-size: 2rem; margin-bottom: 10px; }
    .feature-card h3 { font-size: 1rem; margin-bottom: 5px; }
    .feature-card p { font-size: 0.8rem; color: #aaa; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>💰 ExpenseTracker <span>by Yasmine</span></h1>
    <p>Gérez vos dépenses intelligemment</p>
    <div class="btns">
      <a href="login.html" class="btn-primary">Se connecter</a>
      <a href="register.html" class="btn-secondary">S'inscrire</a>
    </div>
    <div class="features">
      <div class="feature-card"><div class="icon">📊</div><h3>Statistiques</h3><p>Analysez vos habitudes</p></div>
      <div class="feature-card"><div class="icon">💳</div><h3>Dépenses</h3><p>Suivez chaque centime</p></div>
      <div class="feature-card"><div class="icon">🎯</div><h3>Objectifs</h3><p>Économisez mieux</p></div>
      <div class="feature-card"><div class="icon">🔔</div><h3>Alertes</h3><p>Ne dépassez plus</p></div>
    </div>
  </div>
</body>
</html>
